<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Screen D - AI Studio (From Text)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569', 500: '#64748b', 400: '#94a3b8', 300: '#cbd5e1', 200: '#e2e8f0' },
              orange: { 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
              cyan: { 400: '#22d3ee', 500: '#06b6d4' },
              emerald: { 400: '#34d399', 500: '#10b981' }
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
      .label-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; font-weight: 600; color: #94a3b8; }
      .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 24px 24px; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-12 border-b border-slate-800 bg-slate-900 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-8 h-full">
            <div class="flex items-center gap-2 text-slate-500 font-bold tracking-tight">
                <i data-lucide="box" class="w-5 h-5"></i>
                <span data-testid="app-logo">FORGESLICER</span>
            </div>
            <nav class="flex h-full">
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">PARAM</button>
                <button class="px-4 h-full border-b-2 border-orange-500 text-slate-200 font-medium text-sm flex items-center transition-colors">AI</button>
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">MP</button>
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">SETTINGS</button>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center hover:bg-slate-700 transition-colors">
                <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
            </button>
        </div>
    </header>

    <!-- AI Studio Header Surface -->
    <div class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-6">
            <button data-testid="btn-back-workspace" class="flex items-center gap-1.5 text-xs font-medium text-slate-300 hover:text-white bg-slate-800/80 hover:bg-slate-700 px-2.5 py-1.5 rounded border border-slate-700 transition-colors">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Workspace
            </button>
            <div class="h-5 w-px bg-slate-800"></div>
            <nav class="flex gap-1 bg-slate-950 p-1 rounded-md border border-slate-800">
                <button data-testid="subtab-from-text" class="px-3 py-1.5 text-xs font-medium text-white bg-slate-800 rounded shadow-sm border border-slate-700">From Text</button>
                <button data-testid="subtab-from-image" class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">From Image</button>
                <button data-testid="subtab-multi-image" class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">Multi-Image</button>
                <button data-testid="subtab-lithoforge" class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">LithoForge</button>
            </nav>
        </div>
    </div>

    <!-- 2-Column Layout for standard AI -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Left Col: Prompt Config -->
        <div data-testid="col-config" class="w-[340px] border-r border-slate-800 bg-slate-900 flex flex-col z-10 shadow-xl">
            <div class="p-5 space-y-7 flex-1 overflow-y-auto">
                <div>
                    <div class="label-text mb-3">Prompt</div>
                    <textarea data-testid="textarea-prompt" class="w-full h-36 bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm text-slate-200 focus:outline-none focus:border-orange-500 transition-colors placeholder:text-slate-600 resize-none shadow-inner" placeholder="Describe the 3D model you want to generate..."></textarea>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <button class="text-[10px] bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 transition-colors">mechanical part</button>
                        <button class="text-[10px] bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 transition-colors">organic shape</button>
                        <button class="text-[10px] bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 transition-colors">low poly</button>
                    </div>
                </div>
                
                <div class="h-px bg-slate-800"></div>
                
                <div>
                    <div class="label-text mb-4">Generation Settings</div>
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Detail Level</span>
                                <span class="font-mono text-[10px] text-slate-300 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">High</span>
                            </div>
                            <input data-testid="slider-detail" type="range" class="w-full accent-slate-500" value="80">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Anchored Generate Area (Left col for this layout) -->
            <div class="p-4 border-t border-slate-800 bg-slate-900/90 backdrop-blur">
                <button data-testid="btn-generate-mesh" class="w-full py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded text-sm font-medium flex items-center justify-center gap-2 shadow-lg shadow-orange-500/20 transition-colors">
                    <i data-lucide="sparkles" class="w-4 h-4"></i> Generate Mesh
                </button>
                <div class="text-[10px] text-center text-slate-500 mt-3 flex items-center justify-center gap-1">
                    <i data-lucide="coins" class="w-3 h-3"></i> Uses 5 credits
                </div>
            </div>
        </div>

        <!-- Right Col: Preview Grid or Large Viewport -->
        <div data-testid="col-viewport" class="flex-1 bg-slate-950 bg-grid relative flex flex-col items-center justify-center p-8">
            <div class="text-center space-y-4 max-w-sm">
                <div class="w-20 h-20 bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center mx-auto text-slate-700 mb-6 shadow-inner">
                    <i data-lucide="box" class="w-10 h-10"></i>
                </div>
                <h3 class="text-slate-300 font-medium text-lg">Ready to Generate</h3>
                <p class="text-sm text-slate-500 leading-relaxed">Enter a prompt on the left and hit Generate to create a 3D mesh. The process takes about 30 seconds.</p>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
