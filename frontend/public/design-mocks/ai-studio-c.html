<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Screen C - AI Studio LithoForge (Bas-Relief)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569', 500: '#64748b', 400: '#94a3b8', 300: '#cbd5e1', 200: '#e2e8f0' },
              orange: { 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
              cyan: { 400: '#22d3ee', 500: '#06b6d4' },
              emerald: { 400: '#34d399', 500: '#10b981' }
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
      .label-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; font-weight: 600; color: #94a3b8; }
      .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 16px 16px; }
      /* custom toggle switch */
      .toggle-checkbox:checked { right: 0; border-color: #10b981; }
      .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col overflow-hidden">
    <!-- App Header (Same) -->
    <header class="h-12 border-b border-slate-800 bg-slate-900 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-8 h-full">
            <div class="flex items-center gap-2 text-slate-500 font-bold tracking-tight">
                <i data-lucide="box" class="w-5 h-5"></i>
                <span data-testid="app-logo">FORGESLICER</span>
            </div>
            <nav class="flex h-full">
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">PARAM</button>
                <button class="px-4 h-full border-b-2 border-orange-500 text-slate-200 font-medium text-sm flex items-center transition-colors">AI</button>
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">MP</button>
                <button class="px-4 h-full border-b-2 border-transparent text-slate-400 hover:text-slate-200 text-sm flex items-center transition-colors">SETTINGS</button>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center hover:bg-slate-700 transition-colors">
                <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
            </button>
        </div>
    </header>

    <!-- Trial Ribbon -->
    <div class="bg-slate-800 text-slate-300 text-xs py-1.5 px-4 flex justify-between items-center shrink-0 border-b border-slate-900">
        <span><i data-lucide="sparkles" class="w-3 h-3 inline mr-1 text-orange-400"></i> <strong class="text-white">Studio Trial</strong> &middot; 14 days left</span>
        <button class="text-slate-500 hover:text-slate-300 transition-colors"><i data-lucide="x" class="w-3 h-3"></i></button>
    </div>

    <!-- AI Studio Header Surface -->
    <div class="bg-slate-900 border-b border-slate-800 px-4 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-6">
            <button data-testid="btn-back-workspace" class="flex items-center gap-1.5 text-xs font-medium text-slate-300 hover:text-white bg-slate-800/80 hover:bg-slate-700 px-2.5 py-1.5 rounded border border-slate-700 transition-colors">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Workspace
            </button>
            <div class="h-5 w-px bg-slate-800"></div>
            <nav class="flex gap-1 bg-slate-950 p-1 rounded-md border border-slate-800">
                <button class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">From Text</button>
                <button class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">From Image</button>
                <button class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors">Multi-Image</button>
                <button class="px-3 py-1.5 text-xs font-medium text-white bg-slate-800 rounded shadow-sm border border-slate-700">LithoForge</button>
            </nav>
        </div>
        <div class="flex bg-slate-950 p-1 rounded-md border border-slate-800">
            <button data-testid="mode-lithophane" class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors flex items-center gap-1.5">
                <i data-lucide="layers" class="w-3.5 h-3.5"></i> Lithophane
            </button>
            <button data-testid="mode-painting" class="px-3 py-1.5 text-xs font-medium text-slate-400 rounded hover:text-slate-200 transition-colors flex items-center gap-1.5">
                <i data-lucide="paintbrush" class="w-3.5 h-3.5"></i> Painting
            </button>
            <button data-testid="mode-bas-relief" class="px-3 py-1.5 text-xs font-medium text-white bg-slate-800 rounded shadow-sm border border-slate-700 flex items-center gap-1.5">
                <i data-lucide="disc" class="w-3.5 h-3.5"></i> Bas-Relief
            </button>
        </div>
    </div>

    <!-- 3-Column Layout -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Left Col: Config (Bas-Relief specific) -->
        <div data-testid="col-config" class="w-72 border-r border-slate-800 bg-slate-900 flex flex-col z-10 shadow-xl">
            <div class="p-4 space-y-7 overflow-y-auto flex-1">
                <div>
                    <div class="label-text mb-4">Geometry</div>
                    <div class="space-y-5">
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Diameter</span>
                                <span class="font-mono text-[10px] text-slate-300 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">100 mm</span>
                            </div>
                            <input data-testid="slider-diameter" type="range" class="w-full accent-slate-500" value="50">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Relief Height</span>
                                <span class="font-mono text-[10px] text-slate-300 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">4.0 mm</span>
                            </div>
                            <input data-testid="slider-relief-height" type="range" class="w-full accent-slate-500" value="40">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Base Thickness</span>
                                <span class="font-mono text-[10px] text-slate-300 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">2.0 mm</span>
                            </div>
                            <input data-testid="slider-base-thick" type="range" class="w-full accent-slate-500" value="20">
                        </div>
                    </div>
                </div>

                <div class="h-px bg-slate-800"></div>

                <div>
                    <div class="label-text mb-4">Processing</div>
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Smoothing</span>
                                <span class="font-mono text-[10px] text-slate-300 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800">High</span>
                            </div>
                            <input data-testid="slider-smoothing" type="range" class="w-full accent-slate-500" value="80">
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-slate-300">Invert depth</span>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input data-testid="toggle-invert" type="checkbox" name="toggle1" id="toggle1" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-[3px] border-slate-700 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out left-0" checked/>
                                <label for="toggle1" class="toggle-label block overflow-hidden h-5 rounded-full bg-emerald-500 cursor-pointer shadow-inner"></label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <span class="text-sm text-slate-300">Wooden frame ring</span>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input data-testid="toggle-frame" type="checkbox" name="toggle2" id="toggle2" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-slate-400 border-[3px] border-slate-700 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out left-0"/>
                                <label for="toggle2" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-800 cursor-pointer shadow-inner"></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Middle Col: Image & Circular Preview -->
        <div data-testid="col-reference" class="w-[340px] border-r border-slate-800 bg-slate-950 flex flex-col items-center justify-center p-6 relative z-10 shadow-xl">
            <div class="absolute top-4 left-4 label-text">Reference</div>
            
            <!-- Circular Crop Preview -->
            <div class="w-60 h-60 rounded-full border-4 border-slate-800 overflow-hidden relative shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-slate-900 group">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" alt="Portrait">
                <div class="absolute inset-0 border-[12px] border-slate-950/40 rounded-full mix-blend-overlay pointer-events-none"></div>
                <!-- Crosshair hint -->
                <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                    <i data-lucide="move" class="w-6 h-6 text-white drop-shadow-md"></i>
                </div>
            </div>
            
            <button data-testid="btn-adjust-crop" class="mt-8 text-xs text-orange-400 hover:text-orange-300 flex items-center gap-1.5 bg-orange-500/10 hover:bg-orange-500/20 px-4 py-2 rounded border border-orange-500/20 transition-colors font-medium">
                <i data-lucide="crop" class="w-3.5 h-3.5"></i> Adjust Crop
            </button>
        </div>

        <!-- Right Col: 3D Viewport -->
        <div data-testid="col-viewport" class="flex-1 bg-slate-950 bg-grid relative flex flex-col min-w-0">
            <div class="absolute top-4 left-4 flex gap-2 z-10">
                <button data-testid="tool-rotate-3d" class="p-2 bg-slate-900/80 backdrop-blur border border-slate-800 rounded text-slate-300 hover:text-white hover:bg-slate-800 transition-colors"><i data-lucide="rotate-3d" class="w-4 h-4"></i></button>
            </div>
            
            <!-- Sculpted Disc Preview -->
            <div class="flex-1 flex items-center justify-center relative p-8">
                <!-- 3D Disc representation -->
                <div class="w-72 h-72 rounded-full bg-slate-800 shadow-[0_30px_60px_rgba(0,0,0,0.8)] transform perspective-[1000px] rotate-x-[45deg] border-b-[10px] border-slate-900 relative flex items-center justify-center overflow-hidden transition-transform duration-700 hover:rotate-x-[35deg]">
                    <!-- Displacement Map simulation -->
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover grayscale mix-blend-hard-light opacity-50 scale-110">
                    <!-- Lighting highlight -->
                    <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-transparent via-white/10 to-black/80 pointer-events-none"></div>
                    <!-- Rim highlight -->
                    <div class="absolute inset-0 rounded-full border-2 border-white/5 pointer-events-none"></div>
                </div>
            </div>

            <!-- Anchored Generate Area -->
            <div class="p-4 border-t border-slate-800 bg-slate-900 flex justify-between items-center z-10">
                <div class="text-xs text-slate-400 flex items-center gap-2">
                    <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                    Est. processing time: <span class="text-slate-200 font-mono">18s</span>
                </div>
                <div class="flex gap-3">
                    <button data-testid="btn-export-stl" class="px-4 py-2 border border-slate-700 bg-slate-800 text-slate-300 rounded text-sm hover:bg-slate-700 hover:text-white font-medium transition-colors">Export STL</button>
                    <button data-testid="btn-generate-mesh" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded text-sm font-medium flex items-center gap-2 shadow-lg shadow-orange-500/20 transition-colors">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Generate Mesh
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Job History Rail (Same as B, collapsed) -->
        <div class="w-14 border-l border-slate-800 bg-slate-900 flex flex-col items-center py-4 gap-5 z-20 shadow-[-10px_0_20px_rgba(0,0,0,0.2)]">
            <button class="text-slate-500 hover:text-slate-200 transition-colors">
                <i data-lucide="history" class="w-5 h-5"></i>
            </button>
            <div class="w-full px-2 h-px bg-slate-800"></div>
            <!-- ... history items ... -->
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.querySelectorAll('.toggle-checkbox').forEach(chk => {
            chk.addEventListener('change', (e) => {
                const label = e.target.nextElementSibling;
                if(e.target.checked) {
                    e.target.style.borderColor = '#10b981'; // emerald-500
                    label.style.backgroundColor = '#10b981';
                } else {
                    e.target.style.borderColor = '#334155'; // slate-700
                    label.style.backgroundColor = '#1e293b'; // slate-800
                }
            });
        });
    </script>
</body>
</html>
